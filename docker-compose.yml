services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-deribit_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-deribit_db}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    build: .
    env_file: .env
    environment: &app_env
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on: &base_depends
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: poetry run alembic upgrade head

  api:
    build: .
    restart: unless-stopped
    env_file: .env
    environment: *app_env
    depends_on:
      <<: *base_depends
      migrate:
        condition: service_completed_successfully
    command: poetry run uvicorn app.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"

  worker:
    build: .
    restart: unless-stopped
    env_file: .env
    environment: *app_env
    depends_on:
      <<: *base_depends
      migrate:
        condition: service_completed_successfully
    command: poetry run celery -A app.core.celery_app.celery_app worker -B --loglevel=info -s /tmp/celerybeat-schedule

volumes:
  postgres_data:
  redis_data: